<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <title>FinFlow.WebApp</title>
    <base href="/" />

    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="FinFlow.WebApp.styles.css" rel="stylesheet" />
    <link href="css/Pages/Login.css" rel="stylesheet" />
    <link href="css/Pages/ForgotPassword.css" rel="stylesheet" />
    <link href="css/Pages/VerifyOtp.css" rel="stylesheet" />
    <link href="css/Pages/CreatePassword.css" rel="stylesheet" />
    <link href="css/Pages/ResetSuccess.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>

<script>

    function moveNext(current, nextFieldId) {

        current.value = current.value.replace(/[^0-9]/g, '');

        if (current.value.length > 1) {
            current.value = current.value[0];
        }

        if (current.value.length === 1) {

            const nextField = document.getElementById(nextFieldId);

            if (nextField) {
                nextField.focus();
            }
        }
    }

    function movePrevious(event, current, previousFieldId) {

        if (event.key === "Backspace" &&
            current.value === "") {

            const previousField =
                document.getElementById(previousFieldId);

            if (previousField) {
                previousField.focus();
            }
        }
    }

</script>
